<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--navy:#1F3864;--navy2:#2c4a7c;--gold:#C8A24B;--bg:#f4f6fa;--card:#fff;--line:#dde3ee;--ok:#1a7f37;--bad:#b91c1c;--muted:#5b6472;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:#1a2233}
header{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
header .logo{width:36px;height:36px;border-radius:9px;background:#fff;color:var(--navy);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:20px}
header h1{font-size:16px;margin:0;line-height:1.1;letter-spacing:.2px}
header .sub{font-size:11px;opacity:.85}
header .spacer{flex:1}
header button.link{background:transparent;border:0;color:#fff;font-size:13px;cursor:pointer;opacity:.9}
.wrap{max-width:960px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0;box-shadow:0 1px 3px rgba(16,24,40,.05)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
h2{font-size:18px;margin:0 0 4px}
h3{font-size:15px;margin:0 0 8px;color:var(--navy)}
label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
input,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff}
button.btn{background:var(--navy);color:#fff;border:0;border-radius:10px;padding:12px 16px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
button.btn:active{background:var(--navy2)}
button.btn.sec{background:#eef2f8;color:var(--navy)}
button.btn.sm{width:auto;padding:8px 12px;font-size:13px}
button.btn.warn{background:#fef3c7;color:#854d0e}
.tabs{display:flex;gap:6px;overflow:auto;margin:6px 0 4px;-webkit-overflow-scrolling:touch}
.tabs button{white-space:nowrap;background:#fff;border:1px solid var(--line);color:var(--navy);border-radius:999px;padding:8px 14px;font-size:13px;cursor:pointer}
.tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.big{font-size:44px;font-weight:800;color:var(--navy);line-height:1}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.pill.ok{background:#dcfce7;color:var(--ok)}
.pill.wait{background:#fef9c3;color:#854d0e}
.pill.recount{background:#fee2e2;color:var(--bad)}
.pill.none{background:#eef2f8;color:var(--muted)}
.pill.unver{background:#e0e7ff;color:#3730a3}
.pill.paused{background:#fef3c7;color:#854d0e}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.rowline{display:grid;grid-template-columns:44px 1fr 1fr;gap:8px;align-items:center;margin-bottom:7px}
.rowline .rn{font-weight:700;color:var(--navy);text-align:center}
.rowline input{padding:9px;font-size:15px}
.muted{color:var(--muted);font-size:13px}
.err{background:#fee2e2;color:var(--bad);padding:10px;border-radius:10px;font-size:13px;margin:8px 0}
.okbox{background:#dcfce7;color:var(--ok);padding:10px;border-radius:10px;font-size:13px;margin:8px 0}
.kpi{display:flex;gap:12px;flex-wrap:wrap}
.kpi .box{flex:1;min-width:130px;background:#f7f9fc;border:1px solid var(--line);border-radius:12px;padding:12px}
.kpi .box .n{font-size:26px;font-weight:800;color:var(--navy)}
.kpi .box .l{font-size:11px;color:var(--muted);text-transform:uppercase}
.center{text-align:center}
.chartbox{position:relative;height:240px}
.crosscheck{font-size:13px;padding:8px 10px;border-radius:10px;margin-top:8px}
.crosscheck.good{background:#dcfce7;color:var(--ok)}
.crosscheck.bad{background:#fef3c7;color:#854d0e}
a.tile{display:block;text-decoration:none;color:inherit}
a{color:var(--navy)}
.tile .card:hover{border-color:var(--navy)}
small.v{position:fixed;bottom:6px;right:8px;color:#aab;font-size:10px}
.up{color:var(--ok);font-weight:700}.down{color:var(--bad);font-weight:700}
@media print{header,.tabs,.noprint{display:none!important}.card{box-shadow:none;border:1px solid #ccc}}
</style>
</head>

<script>

const todayISO=()=>new Date().toISOString().slice(0,10);
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function niceDate(iso){const p=String(iso).split('-');if(p.length<3)return iso;return p[2]+' '+MON[(+p[1])-1]+' '+p[0];}
function perLabel(p){return p==='AM'?'Morning':'Evening';}
function killChart(cv){if(!cv||!window.Chart)return;const ex=window.Chart.getChart(cv);if(ex)ex.destroy();}
function setHeader(){document.getElementById('signout').style.display=ME?'inline':'none';document.getElementById('whoami').textContent=ME?(ME.profile.full_name+' ('+ME.profile.role+')'):'';}
document.getElementById('signout').onclick=async()=>{await sb.auth.signOut();ME=null;location.hash='#/';route();};

async function loadMe(){const {data:{session}}=await sb.auth.getSession();if(!session){ME=null;return;}const {data:p}=await sb.from('profiles').select('*').eq('id',session.user.id).single();ME=p?{profile:p}:null;}

async function route(){['c1','c2'].forEach(id=>{const cv=document.getElementById(id);if(cv)killChart(cv);});setHeader();const h=location.hash||'#/';if(h.startsWith('#/totals'))return viewTotals();if(!ME){if(h.startsWith('#/signin'))return viewSignin();return viewLanding();}setHeader();if(h.startsWith('#/count'))return viewCount();if(h.startsWith('#/dashboard'))return isStaff()?viewDashboard():viewCount();return isStaff()?viewDashboard():viewCount();}
function viewLanding(){app.innerHTML='';app.appendChild(el(`<div class="grid2"><a class="tile" href="#/signin"><div class="card center"><div style="font-size:34px">\u{1F9EE}</div><h2>Counters and Coordinators</h2><p class="muted">Sign in to count or manage a service</p></div></a><a class="tile" href="#/totals"><div class="card center"><div style="font-size:34px">\u{1F4CA}</div><h2>Pastors: View Totals</h2><p class="muted">Live totals and comparisons, no login needed</p></div></a></div>`));}
function viewSignin(){app.innerHTML='';const c=el(`<div class="card" style="max-width:420px;margin:24px auto"><h2>Sign in</h2><div id="e"></div><label>Login (your first name)</label><input id="u" autocapitalize="none" autocorrect="off" placeholder="e.g. refilwe"/><label>PIN (6 digits)</label><input id="p" inputmode="numeric" maxlength="6" placeholder="------"/><div style="height:14px"></div><button class="btn" id="go">Sign in</button><p class="muted" style="margin-top:12px">No login yet? Ask the coordinator to add you.</p><p class="center" style="margin-top:8px"><a href="#/totals">Pastor? View totals</a></p></div>`);app.appendChild(c);const go=async()=>{const u=c.querySelector('#u').value.trim().toLowerCase();const p=c.querySelector('#p').value.trim();c.querySelector('#e').innerHTML='';if(!u||!p){c.querySelector('#e').innerHTML='<div class="err">Enter your login and PIN.</div>';return;}c.querySelector('#go').textContent='Signing in';const {error}=await sb.auth.signInWithPassword({email:u+EMAIL_DOMAIN,password:p});if(error){c.querySelector('#e').innerHTML='<div class="err">Wrong login or PIN.</div>';c.querySelector('#go').textContent='Sign in';return;}await loadMe();location.hash='#/';route();};c.querySelector('#go').onclick=go;c.querySelector('#p').addEventListener('keydown',e=>{if(e.key==='Enter')go();});}
async function viewCount(){app.innerHTML='<div class="card">Loading</div>';const {data:svc}=await sb.from('services').select('*').eq('status','open').order('created_at',{ascending:false}).limit(1);const service=svc&&svc[0];if(!service){const {data:pz}=await sb.from('services').select('id').eq('status','paused').limit(1);const paused=pz&&pz.length;const msg=paused?'Counting is paused by the coordinator. Please wait to be told to continue.':'There is no service open for counting right now. Your coordinator opens one before the service.';app.innerHTML='<div class="card"><h2>'+(paused?'Counting paused':'No open service')+'</h2><p class="muted">'+msg+'</p>'+(isStaff()?'<a href="#/dashboard"><button class="btn sec">Go to dashboard</button></a>':'')+'</div>';return;}const {data:asg}=await sb.from('assignments').select('section_id,slot,sections(name,capacity,row_count)').eq('service_id',service.id).eq('counter_id',ME.profile.id).order('section_id');const {data:res}=await sb.from('section_results').select('*').eq('service_id',service.id);const {data:mine}=await sb.from('counts').select('section_id,attempt').eq('service_id',service.id).eq('counter_id',ME.profile.id);const resById={};(res||[]).forEach(r=>resById[r.section_id]=r);const submitted={};(mine||[]).forEach(m=>{submitted[m.section_id]=Math.max(submitted[m.section_id]||0,m.attempt);});app.innerHTML='';app.appendChild(el(`<div class="card"><h2>${esc(perLabel(service.period))} service, ${esc(niceDate(service.service_date))}</h2><p class="muted">Count each of your blocks row by row. Enter people <b>seated</b> and <b>empty</b> chairs per row.</p></div>`));if(isStaff())app.appendChild(el('<div style="margin:-6px 0 6px"><a href="#/dashboard"><button class="btn sec sm">Back to dashboard</button></a></div>'));if(!asg||!asg.length){app.appendChild(el('<div class="card">You have no blocks assigned yet. Ask the coordinator to assign you a block (Dashboard, Service, Assign counters).</div>'));return;}asg.forEach(a=>{const r=resById[a.section_id];const curAttempt=(r&&r.attempt)||1;const done=submitted[a.section_id]&&submitted[a.section_id]>=curAttempt;let status='<span class="pill none">not started</span>';if(r){const m={not_started:'none',awaiting_second:'wait',recount:'recount',accepted:'ok',unverified:'unver'};const lbl={not_started:'not started',awaiting_second:'awaiting 2nd',recount:'recount rows',accepted:'accepted '+(r.final_total==null?'':r.final_total),unverified:'recorded '+(r.final_total==null?'':r.final_total)};status=`<span class="pill ${m[r.status]}">${lbl[r.status]}</span>`;}const card=el(`<div class="card"><div style="display:flex;align-items:center;gap:8px"><h3 style="flex:1;margin:0">${esc(a.sections.name)}</h3>${status}</div><div class="muted">Capacity ${fmt(a.sections.capacity)} chairs, attempt ${curAttempt}</div><div class="blockbody"></div></div>`);const body=card.querySelector('.blockbody');if(done&&(r&&r.status!=='recount')){body.innerHTML='<div class="okbox">Your count is in for this block.</div><button class="btn sec sm recount-btn">Re-enter my count</button>';body.querySelector('.recount-btn').onclick=()=>renderRowEntry(body,service,a,curAttempt);}else{renderRowEntry(body,service,a,curAttempt);}app.appendChild(card);});}
function renderRowEntry(body,service,a,attempt){const n=a.sections.row_count||18;const cap=a.sections.capacity||0;let rowsHtml='';for(let i=1;i<=n;i++){rowsHtml+=`<div class="rowline"><div class="rn">${i}</div><input class="s" data-r="${i}" inputmode="numeric" placeholder="seated"/><input class="e" data-r="${i}" inputmode="numeric" placeholder="empty"/></div>`;}body.innerHTML=`<div class="rowline" style="margin-top:6px"><div class="rn"></div><div class="muted center">Seated</div><div class="muted center">Empty</div></div>${rowsHtml}<div style="display:flex;gap:8px;margin:6px 0"><button class="btn sec sm addrow">Add row</button></div><label>Photo of your tally (optional)</label><input type="file" accept="image/*" capture="environment" class="photo"/><div class="crosscheck good cc"></div><div class="ee"></div><button class="btn submit">Submit count</button>`;const recompute=()=>{let s=0,e=0;body.querySelectorAll('.s').forEach(x=>s+=parseInt(x.value||0)||0);body.querySelectorAll('.e').forEach(x=>e+=parseInt(x.value||0)||0);const cc=body.querySelector('.cc');const sum=s+e;let msg=`Seated <b>${fmt(s)}</b>, empty <b>${fmt(e)}</b>, total <b>${fmt(sum)}</b> vs capacity ${fmt(cap)}`;if(cap&&sum!==cap){cc.className='crosscheck bad cc';msg+=`. Off by ${sum-cap>0?'+':''}${sum-cap}, please recheck.`;}else{cc.className='crosscheck good cc';msg+=cap?'. Matches.':'';}cc.innerHTML=msg;};body.addEventListener('input',recompute);body.querySelector('.addrow').onclick=()=>{const rn=body.querySelectorAll('.s').length+1;const line=el(`<div class="rowline"><div class="rn">${rn}</div><input class="s" data-r="${rn}" inputmode="numeric" placeholder="seated"/><input class="e" data-r="${rn}" inputmode="numeric" placeholder="empty"/></div>`);body.querySelector('.addrow').parentElement.before(line);};recompute();body.querySelector('.submit').onclick=()=>submitCount(body,service,a,attempt);}
async function submitCount(body,service,a,attempt){const btn=body.querySelector('.submit');const rows=[];let seated=0,empty=0;body.querySelectorAll('.rowline').forEach(line=>{const si=line.querySelector('.s'),ei=line.querySelector('.e');if(!si)return;const rn=parseInt(si.dataset.r);const s=parseInt(si.value||0)||0,e=parseInt(ei.value||0)||0;if(si.value===''&&ei.value==='')return;rows.push({row_no:rn,seated:s,empty:e});seated+=s;empty+=e;});if(!rows.length){body.querySelector('.ee').innerHTML='<div class="err">Enter at least one row.</div>';return;}btn.textContent='Submitting';btn.disabled=true;body.querySelector('.ee').innerHTML='';let photo_path=null;const pf=body.querySelector('.photo').files[0];if(pf){const path=`${service.id}/${a.section_id}/${ME.profile.id}-${Date.now()}.jpg`;const up=await sb.storage.from('photos').upload(path,pf,{upsert:true});if(!up.error)photo_path=path;}const ins=await sb.from('counts').insert({service_id:service.id,section_id:a.section_id,counter_id:ME.profile.id,attempt:attempt,figure:seated,seated:seated,empty:empty,photo_path:photo_path}).select('id').single();if(ins.error){body.querySelector('.ee').innerHTML='<div class="err">Could not submit: '+esc(ins.error.message)+'</div>';btn.textContent='Submit count';btn.disabled=false;return;}const cid=ins.data.id;await sb.from('count_rows').insert(rows.map(r=>({count_id:cid,row_no:r.row_no,seated:r.seated,empty:r.empty})));body.innerHTML='<div class="okbox">Count submitted. Seated total '+fmt(seated)+'.</div>';setTimeout(()=>viewCount(),900);}
let DASH_TAB='live';
async function viewDashboard(){app.innerHTML='';app.appendChild(el(`<div><div style="margin-bottom:8px"><a href="#/count"><button class="btn sec sm">Count a block (if you are assigned)</button></a></div><div class="tabs" id="tabs"><button data-t="live">Live count</button><button data-t="reconcile">Reconcile</button><button data-t="service">Service</button><button data-t="report">Report</button><button data-t="team">Team</button><button data-t="compare">Compare</button></div><div id="tabbody"></div></div>`));document.querySelectorAll('#tabs button').forEach(b=>{b.onclick=()=>{DASH_TAB=b.dataset.t;paintTabs();};});paintTabs();}
function paintTabs(){document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===DASH_TAB));const body=document.getElementById('tabbody');if(!body)return;body.innerHTML='<div class="card">Loading</div>';if(DASH_TAB==='live')tabLive(body);else if(DASH_TAB==='reconcile')tabReconcile(body);else if(DASH_TAB==='service')tabService(body);else if(DASH_TAB==='report')tabReport(body);else if(DASH_TAB==='team')tabTeam(body);else if(DASH_TAB==='compare')tabCompare(body);}
async function currentService(){const {data}=await sb.from('services').select('*').order('created_at',{ascending:false}).limit(20);const list=data||[];return list.find(s=>s.status==='open')||list.find(s=>s.status==='paused')||list[0];}
async function tabLive(body){const service=await currentService();if(!service){body.innerHTML='<div class="card">No service yet. Open one in the <b>Service</b> tab.</div>';return;}const {data:secs}=await sb.from('sections').select('*').eq('active',true).order('sort_order');const {data:res}=await sb.from('section_results').select('*').eq('service_id',service.id);const resById={};(res||[]).forEach(r=>resById[r.section_id]=r);let grand=0,done=0;const cap=(secs||[]).reduce((a,s)=>a+(s.capacity||0),0);(secs||[]).forEach(s=>{const r=resById[s.id];if(r&&(r.status==='accepted'||r.status==='unverified')){grand+=r.final_total||0;done++;}});const stcls=service.status==='open'?'ok':(service.status==='paused'?'paused':'none');body.innerHTML='';body.appendChild(el(`<div class="card"><div style="display:flex;align-items:center"><div style="flex:1"><div class="muted">${esc(perLabel(service.period))} service, ${esc(niceDate(service.service_date))} <span class="pill ${stcls}">${service.status}</span></div><div class="big">${fmt(grand)}</div><div class="muted">running total, ${done} of ${(secs||[]).length} blocks confirmed, capacity ${fmt(cap)}</div></div></div><button class="btn sec sm" id="refresh">Refresh</button></div>`));let rh='';(secs||[]).forEach(s=>{const r=resById[s.id];const map={accepted:['ok','accepted'],awaiting_second:['wait','awaiting 2nd'],recount:['recount','recount'],unverified:['unver','recorded'],not_started:['none','not started']};const st=r?r.status:'not_started';const mm=map[st]||['none','not started'];rh+=`<tr><td>${esc(s.name)}</td><td><span class="pill ${mm[0]}">${mm[1]}</span></td><td style="text-align:right;font-weight:700">${r&&r.final_total!=null?fmt(r.final_total):''}</td></tr>`;});body.appendChild(el(`<div class="card"><table><thead><tr><th>Block</th><th>Status</th><th style="text-align:right">Total</th></tr></thead><tbody>${rh}</tbody></table></div>`));document.getElementById('refresh').onclick=()=>tabLive(body);}
async function tabReconcile(body){const service=await currentService();if(!service){body.innerHTML='<div class="card">No service.</div>';return;}const {data:secs}=await sb.from('sections').select('*').eq('active',true).order('sort_order');const {data:res}=await sb.from('section_results').select('*').eq('service_id',service.id);const {data:counts}=await sb.from('counts').select('id,section_id,counter_id,attempt,seated,empty,figure,profiles(full_name)').eq('service_id',service.id);const ids=(counts||[]).map(c=>c.id);const {data:crows}=await sb.from('count_rows').select('*').in('count_id',ids.length?ids:['00000000-0000-0000-0000-000000000000']);const rowsByCount={};(crows||[]).forEach(r=>{(rowsByCount[r.count_id]=rowsByCount[r.count_id]||{})[r.row_no]=r;});const resById={};(res||[]).forEach(r=>resById[r.section_id]=r);body.innerHTML='';body.appendChild(el('<div class="card"><h3>Reconciliation</h3><p class="muted">Blocks where the two counters differ. Compare row by row and ask them to recount the rows that do not match.</p></div>'));let any=false;(secs||[]).forEach(s=>{const cs=(counts||[]).filter(c=>c.section_id===s.id);const r=resById[s.id];if(cs.length<2)return;const maxAtt=Math.max(...cs.map(c=>c.attempt));const latest=cs.filter(c=>c.attempt===maxAtt);if(latest.length<2)return;const A=latest[0],B=latest[1];const diff=Math.abs((A.seated||A.figure||0)-(B.seated||B.figure||0));if(r&&r.status==='accepted'&&diff<=2)return;any=true;const rowsA=rowsByCount[A.id]||{},rowsB=rowsByCount[B.id]||{};const allRows=[...new Set([...Object.keys(rowsA),...Object.keys(rowsB)].map(Number))].sort((a,b)=>a-b);let rh='';allRows.forEach(rn=>{const sa=rowsA[rn]?rowsA[rn].seated:'',sbv=rowsB[rn]?rowsB[rn].seated:'';const d=(sa!==''&&sbv!=='')?(sa-sbv):'';const hl=(d!==''&&d!==0)?' style="background:#fff1f2"':'';rh+=`<tr${hl}><td>${rn}</td><td>${sa}</td><td>${sbv}</td><td>${d!==0&&d!==''?'<b style=\"color:#b91c1c\">'+(d>0?'+':'')+d+'</b>':(d===0?'ok':'')}</td></tr>`;});const card=el(`<div class="card"><div style="display:flex;align-items:center"><h3 style="flex:1;margin:0">${esc(s.name)}</h3><span class="pill ${diff<=2?'ok':'recount'}">total diff ${diff}</span></div><div class="muted">${esc(A.profiles?A.profiles.full_name:'A')}: ${fmt(A.seated||A.figure)}, ${esc(B.profiles?B.profiles.full_name:'B')}: ${fmt(B.seated||B.figure)}</div><table style="margin-top:8px"><thead><tr><th>Row</th><th>${esc((A.profiles?A.profiles.full_name:'A').split(' ')[0])}</th><th>${esc((B.profiles?B.profiles.full_name:'B').split(' ')[0])}</th><th>Diff</th></tr></thead><tbody>${rh}</tbody></table><div style="margin-top:8px"><button class="btn sec sm force">Accept ${fmt(Math.round(((A.seated||A.figure)+(B.seated||B.figure))/2))} (average)</button></div></div>`);card.querySelector('.force').onclick=async()=>{const total=Math.round(((A.seated||A.figure)+(B.seated||B.figure))/2);await sb.from('section_results').update({status:'accepted',final_total:total,updated_at:new Date().toISOString()}).eq('service_id',service.id).eq('section_id',s.id);tabReconcile(body);};body.appendChild(card);});if(!any)body.appendChild(el('<div class="card okbox">No mismatches to reconcile right now.</div>'));}
async function tabService(body){const {data:services}=await sb.from('services').select('*').order('created_at',{ascending:false}).limit(10);const list=services||[];const open=list.find(s=>s.status==='open');const paused=list.find(s=>s.status==='paused');const active=open||paused;body.innerHTML='';if(active){const isOpen=active.status==='open';body.appendChild(el(`<div class="card"><h3>${isOpen?'Open service':'Paused service'}</h3><div class="muted">${esc(perLabel(active.period))} service, ${esc(niceDate(active.service_date))} <span class="pill ${isOpen?'ok':'paused'}">${active.status}</span></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"><button class="btn sec sm" id="assign">Assign counters</button>${isOpen?'<button class="btn warn sm" id="pause">Pause counting</button>':'<button class="btn sm" id="resume">Resume counting</button>'}<button class="btn sm" id="close">Close and record total</button></div><p class="muted" style="margin-top:8px">${isOpen?'Pause temporarily stops counters so you can step away or edit a previous service, without saving totals. Close saves the final total to history.':'Counting is paused. Resume to let counters continue, or reopen a previous service below to edit it.'}</p><div id="assignbox"></div></div>`));if(isOpen)document.getElementById('pause').onclick=async()=>{await sb.from('services').update({status:'paused'}).eq('id',active.id);tabService(body);};if(!isOpen)document.getElementById('resume').onclick=async()=>{const other=list.find(s=>s.status==='open'&&s.id!==active.id);if(other){alert('Another service is currently open. Close it first.');return;}await sb.from('services').update({status:'open'}).eq('id',active.id);tabService(body);};document.getElementById('close').onclick=async()=>{if(!confirm('Close this service? The grand total will be saved into history for comparisons.'))return;const {data:res}=await sb.from('section_results').select('final_total,status').eq('service_id',active.id);const total=(res||[]).filter(r=>r.status==='accepted'||r.status==='unverified').reduce((a,r)=>a+(r.final_total||0),0);await sb.from('services').update({status:'closed'}).eq('id',active.id);await sb.from('attendance_history').upsert({service_date:active.service_date,period:active.period,attendance:total,source:'live'},{onConflict:'service_date,period'});tabService(body);};document.getElementById('assign').onclick=()=>renderAssign(document.getElementById('assignbox'),active);}else{body.appendChild(el(`<div class="card"><h3>Open a service</h3><label>Date</label><input type="date" id="d" value="${todayISO()}"/><label>Service</label><select id="p"><option value="AM">Morning (AM)</option><option value="PM">Evening (PM)</option></select><div style="height:10px"></div><button class="btn" id="open">Open service</button><p class="muted" style="margin-top:8px">The block line-up for this time of day loads automatically. You can adjust it under Assign counters.</p></div>`));document.getElementById('open').onclick=async()=>{const d=document.getElementById('d').value,p=document.getElementById('p').value;const {error}=await sb.from('services').insert({service_date:d,period:p,status:'open'});if(error){alert(error.message);return;}tabService(body);};}let rh='';list.forEach(s=>{const stcls=s.status==='open'?'ok':(s.status==='paused'?'paused':'none');const act=s.status==='closed'?`<button class="btn sec sm reopen" data-id="${s.id}">Reopen to edit</button>`:'';rh+=`<tr><td>${esc(niceDate(s.service_date))}</td><td>${esc(perLabel(s.period))}</td><td><span class="pill ${stcls}">${s.status}</span></td><td>${act}</td></tr>`;});const hist=el(`<div class="card"><h3>Recent services</h3><table><thead><tr><th>Date</th><th>Service</th><th>Status</th><th></th></tr></thead><tbody>${rh}</tbody></table></div>`);hist.querySelectorAll('.reopen').forEach(btn=>{btn.onclick=async()=>{if(open){alert('A service is currently open. Pause or close it first, then reopen this one.');return;}if(!confirm('Reopen this service so you can edit or recount it?'))return;await sb.from('services').update({status:'open'}).eq('id',btn.dataset.id);DASH_TAB='service';paintTabs();};});body.appendChild(hist);}
async function renderAssign(box,service){box.innerHTML='<p class="muted">Loading</p>';const {data:secs}=await sb.from('sections').select('*').eq('active',true).order('sort_order');const {data:people}=await sb.from('profiles').select('id,full_name,role').eq('active',true).order('full_name');const {data:asg}=await sb.from('assignments').select('*').eq('service_id',service.id);const bySec={};(asg||[]).forEach(a=>{(bySec[a.section_id]=bySec[a.section_id]||[]).push(a);});const optsFor=(selId)=>(people||[]).map(p=>`<option value="${p.id}"${p.id===selId?' selected':''}>${esc(p.full_name)}${p.role!=='counter'?' ('+p.role+')':''}</option>`).join('');let rh='';(secs||[]).forEach(s=>{const cur=bySec[s.id]||[];const c1=cur.find(a=>a.slot===1),c2=cur.find(a=>a.slot===2);rh+=`<tr><td>${esc(s.name)}</td><td><select data-sec="${s.id}" data-slot="1"><option value="">none</option>${optsFor(c1&&c1.counter_id)}</select></td><td><select data-sec="${s.id}" data-slot="2"><option value="">none</option>${optsFor(c2&&c2.counter_id)}</select></td></tr>`;});box.innerHTML=`<h3 style="margin-top:14px">Block assignments (two counters each, anyone can be a counter)</h3><table><thead><tr><th>Block</th><th>Counter 1</th><th>Counter 2</th></tr></thead><tbody>${rh}</tbody></table><button class="btn save" style="margin-top:12px">Save assignments</button>`;const save=box.querySelector('.save');save.onclick=async()=>{save.textContent='Saving';await sb.from('assignments').delete().eq('service_id',service.id);const rows=[];box.querySelectorAll('select[data-sec]').forEach(sel=>{if(sel.value)rows.push({service_id:service.id,section_id:parseInt(sel.dataset.sec),counter_id:sel.value,slot:parseInt(sel.dataset.slot)});});if(rows.length){const {error}=await sb.from('assignments').insert(rows);if(error){alert(error.message);save.textContent='Save assignments';return;}}save.textContent='Saved';setTimeout(()=>save.textContent='Save assignments',1200);};}
async function tabReport(body){const {data:services}=await sb.from('services').select('*').order('created_at',{ascending:false}).limit(40);const list=services||[];if(!list.length){body.innerHTML='<div class="card">No services yet. Open and count a service first.</div>';return;}body.innerHTML=`<div class="card noprint"><h3>Service report</h3><label>Choose a service</label><select id="rsel">${list.map(s=>`<option value="${s.id}">${esc(niceDate(s.service_date))} ${esc(perLabel(s.period))} (${s.status})</option>`).join('')}</select><div style="display:flex;gap:8px;margin-top:10px"><button class="btn sec sm" id="rprint">Print / save PDF</button><button class="btn sec sm" id="rcsv">Download CSV</button></div></div><div id="rbody"></div>`;const sel=body.querySelector('#rsel');let CSV='';const render=async(sid)=>{const svc=list.find(s=>s.id===sid);const rb=body.querySelector('#rbody');rb.innerHTML='<div class="card">Loading</div>';const {data:secs}=await sb.from('sections').select('*').eq('active',true).order('sort_order');const {data:res}=await sb.from('section_results').select('*').eq('service_id',sid);const {data:hist}=await sb.from('attendance_history').select('*').eq('period',svc.period).order('service_date',{ascending:false});const resById={};(res||[]).forEach(r=>resById[r.section_id]=r);let gSeat=0,gCap=0,gEmpty=0,done=0;let rows=[['Block','Capacity','Seated','Empty','Status']];let rh='';(secs||[]).forEach(s=>{const r=resById[s.id];const seat=r&&(r.status==='accepted'||r.status==='unverified')?(r.final_total||0):null;const cap=s.capacity||0;const empty=seat!=null?Math.max(cap-seat,0):null;if(seat!=null){gSeat+=seat;gEmpty+=(empty||0);done++;}gCap+=cap;const st=r?r.status:'not started';rows.push([s.name,cap,seat==null?'':seat,empty==null?'':empty,st]);rh+=`<tr><td>${esc(s.name)}</td><td>${fmt(cap)}</td><td style="font-weight:700">${seat==null?'-':fmt(seat)}</td><td>${empty==null?'-':fmt(empty)}</td><td><span class="pill ${st==='accepted'?'ok':(st==='recount'?'recount':'none')}">${st}</span></td></tr>`;});const occ=gCap?Math.round((gSeat/gCap)*100):0;rows.push(['TOTAL',gCap,gSeat,gEmpty,done+' of '+(secs||[]).length+' blocks']);CSV='CRC JHB Attendance report,'+niceDate(svc.service_date)+' '+perLabel(svc.period)+'\n'+rows.map(r=>r.join(',')).join('\n');const lastWeek=(hist||[]).find(h=>h.service_date<svc.service_date);let lastYear=null;{const t=new Date(svc.service_date);t.setFullYear(t.getFullYear()-1);let best=1e15;(hist||[]).forEach(h=>{const dd=Math.abs(new Date(h.service_date)-t);if(dd<best){best=dd;lastYear=h;}});}let cmp='';if(lastWeek){const dl=gSeat-lastWeek.attendance;cmp+=`<div class="box"><div class="n ${dl>=0?'up':'down'}">${dl>=0?'+':''}${fmt(dl)}</div><div class="l">vs last week (${fmt(lastWeek.attendance)})</div></div>`;}if(lastYear){const dl=gSeat-lastYear.attendance;cmp+=`<div class="box"><div class="n ${dl>=0?'up':'down'}">${dl>=0?'+':''}${fmt(dl)}</div><div class="l">vs ${lastYear.service_date.slice(0,4)} (${fmt(lastYear.attendance)})</div></div>`;}rb.innerHTML=`<div class="card"><h2 style="margin:0">${esc(perLabel(svc.period))} service, ${esc(niceDate(svc.service_date))}</h2><div class="muted" style="margin-bottom:10px">Status: ${svc.status}</div><div class="kpi"><div class="box"><div class="n">${fmt(gSeat)}</div><div class="l">total attendance</div></div><div class="box"><div class="n">${occ}%</div><div class="l">of ${fmt(gCap)} seats</div></div><div class="box"><div class="n">${fmt(gEmpty)}</div><div class="l">empty seats</div></div>${cmp}</div></div><div class="card"><h3>Block breakdown</h3><table><thead><tr><th>Block</th><th>Capacity</th><th>Seated</th><th>Empty</th><th>Status</th></tr></thead><tbody>${rh}<tr style="font-weight:800"><td>Total</td><td>${fmt(gCap)}</td><td>${fmt(gSeat)}</td><td>${fmt(gEmpty)}</td><td>${done} of ${(secs||[]).length}</td></tr></tbody></table></div>`;};sel.onchange=()=>render(sel.value);body.querySelector('#rprint').onclick=()=>window.print();body.querySelector('#rcsv').onclick=()=>{const svc=list.find(s=>s.id===sel.value);const blob=new Blob([CSV],{type:'text/csv'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='CRC-report-'+svc.service_date+'-'+svc.period+'.csv';a.click();URL.revokeObjectURL(u);};render(sel.value);}
async function tabTeam(body){const {data:people}=await sb.from('profiles').select('*').order('role').order('full_name');let rh='';(people||[]).forEach(p=>{rh+=`<tr><td>${esc(p.full_name)}</td><td>${esc(p.phone)}</td><td>${esc(p.role)}${p.active?'':' (off)'}</td></tr>`;});body.innerHTML='';body.appendChild(el(`<div class="card"><h3>Team</h3><table><thead><tr><th>Name</th><th>Login</th><th>Role</th></tr></thead><tbody>${rh}</tbody></table></div>`));body.appendChild(el(`<div class="card"><h3>Adding people and PINs</h3><p class="muted">New members and PIN resets are handled on the back end for security. Ask Lindelwa (admin) to add a name and issue a PIN. Current PINs are on the printed login sheet.</p></div>`));}
function yearAverages(history){const byYear={};history.forEach(r=>{const y=r.d.slice(0,4);(byYear[y]=byYear[y]||{AM:[],PM:[]})[r.p].push(r.a);});return Object.keys(byYear).sort().map(y=>({year:y,am:avg(byYear[y].AM),pm:avg(byYear[y].PM)}));}
const avg=(a)=>a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):0;
async function loadTotals(){const {data,error}=await sb.rpc('get_public_totals');if(error)throw error;return data;}
function drawTrend(canvas,history,period){killChart(canvas);const rows=history.filter(r=>r.p===period).sort((a,b)=>a.d<b.d?-1:1).slice(-26);new Chart(canvas,{type:'line',data:{labels:rows.map(r=>r.d.slice(5)),datasets:[{label:period,data:rows.map(r=>r.a),borderColor:'#1F3864',backgroundColor:'rgba(31,56,100,.08)',fill:true,tension:.3,pointRadius:2}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:false}},maintainAspectRatio:false}});}
function drawYoY(canvas,history){killChart(canvas);const rows=yearAverages(history);new Chart(canvas,{type:'bar',data:{labels:rows.map(r=>r.year),datasets:[{label:'Avg morning',data:rows.map(r=>r.am),backgroundColor:'#1F3864'},{label:'Avg evening',data:rows.map(r=>r.pm),backgroundColor:'#C8A24B'}]},options:{plugins:{legend:{position:'bottom'}},maintainAspectRatio:false}});}
let CMP_PERIOD='AM';
async function tabCompare(body){body.innerHTML='<div class="card">Loading</div>';let d;try{d=await loadTotals();}catch(e){body.innerHTML='<div class="card err">Could not load totals.</div>';return;}body.innerHTML='';const head=el(`<div class="card"><div style="display:flex;align-items:center;gap:8px"><h3 style="flex:1;margin:0">Comparisons</h3><div class="tabs" style="margin:0"><button data-p="AM" class="pbtn">Morning</button><button data-p="PM" class="pbtn">Evening</button></div></div><div class="cmpcards kpi"></div></div>`);body.appendChild(head);const trend=el('<div class="card"><h3>Week to week</h3><div class="chartbox"><canvas id="c1"></canvas></div></div>');const yoy=el('<div class="card"><h3>Year to year (average per service)</h3><div class="chartbox"><canvas id="c2"></canvas></div></div>');body.appendChild(trend);body.appendChild(yoy);const paint=()=>{head.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('on',b.dataset.p===CMP_PERIOD));const cc=head.querySelector('.cmpcards');cc.innerHTML='';const hist=(d.history||[]).filter(r=>r.p===CMP_PERIOD).sort((a,b)=>a.d<b.d?1:-1);const latest=hist[0];const prev=hist[1];const cur=(d.current&&d.current.period===CMP_PERIOD&&d.current.status==='open')?d.current.grand_total:(latest?latest.a:0);cc.appendChild(el(`<div class="box"><div class="n">${fmt(cur)}</div><div class="l">${(d.current&&d.current.status==='open'&&d.current.period===CMP_PERIOD)?'live now':'latest'}</div></div>`));if(prev){const del=cur-prev.a;cc.appendChild(el(`<div class="box"><div class="n ${del>=0?'up':'down'}">${del>=0?'+':''}${fmt(del)}</div><div class="l">vs last week (${fmt(prev.a)})</div></div>`));}drawTrend(document.getElementById('c1'),d.history,CMP_PERIOD);drawYoY(document.getElementById('c2'),d.history);};head.querySelectorAll('.pbtn').forEach(b=>b.onclick=()=>{CMP_PERIOD=b.dataset.p;paint();});paint();}
async function viewTotals(){app.innerHTML='<div class="card">Loading</div>';let d;try{d=await loadTotals();}catch(e){app.innerHTML='<div class="card err">Could not load totals.</div>';return;}app.innerHTML='';const wrap=el('<div></div>');app.appendChild(wrap);let PER=(d.current&&d.current.period)||'AM';const render=()=>{if(document.getElementById('c1'))killChart(document.getElementById('c1'));wrap.innerHTML='';const head=el(`<div class="card"><div style="display:flex;align-items:center;gap:10px"><h2 style="flex:1;margin:0">Attendance</h2><div class="tabs" style="margin:0"><button class="pbtn" data-p="AM">Morning</button><button class="pbtn" data-p="PM">Evening</button></div></div></div>`);wrap.appendChild(head);const hist=(d.history||[]).filter(r=>r.p===PER).sort((a,b)=>a.d<b.d?1:-1);const latestHist=hist[0];const live=(d.current&&d.current.period===PER&&d.current.status==='open');const cur=live?d.current.grand_total:(latestHist?latestHist.a:0);const prev=hist[live?0:1]||latestHist;let ly=null;if(latestHist){const t=new Date(latestHist.d);t.setFullYear(t.getFullYear()-1);let best=1e15;hist.forEach(r=>{const dd=Math.abs(new Date(r.d)-t);if(dd<best){best=dd;ly=r;}});}wrap.appendChild(el(`<div class="card center"><div class="muted">${PER==='AM'?'Morning service':'Evening service'} ${live?'<span class=\"pill ok\">live now</span>':''}</div><div class="big" style="font-size:56px;margin:8px 0">${fmt(cur)}</div><div class="muted">${live?'counting now':(latestHist?niceDate(latestHist.d):'')}</div></div>`));const g=el('<div class="grid2"></div>');if(prev){const del=cur-prev.a;g.appendChild(el(`<div class="card center"><div class="muted">Last week</div><div style="font-size:26px;font-weight:800;color:var(--navy)">${fmt(prev.a)}</div><div class="muted ${del>=0?'up':'down'}">${del>=0?'up':'down'} ${fmt(Math.abs(del))}</div></div>`));}if(ly){const del=cur-ly.a;g.appendChild(el(`<div class="card center"><div class="muted">Same week, ${ly.d.slice(0,4)}</div><div style="font-size:26px;font-weight:800;color:var(--navy)">${fmt(ly.a)}</div><div class="muted ${del>=0?'up':'down'}">${del>=0?'up':'down'} ${fmt(Math.abs(del))}</div></div>`));}wrap.appendChild(g);wrap.appendChild(el('<div class="card"><h3>Recent weeks</h3><div class="chartbox"><canvas id="c1"></canvas></div></div>'));drawTrend(document.getElementById('c1'),d.history,PER);head.querySelectorAll('.pbtn').forEach(b=>{b.classList.toggle('on',b.dataset.p===PER);b.onclick=()=>{PER=b.dataset.p;render();};});};render();app.appendChild(el('<div class="center" style="margin:10px"><a href="#/signin">Staff sign in</a></div>'));}
