<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#010027"/>
<title>CRC JHB Steward</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23010027'/><text x='50' y='70' font-size='58' text-anchor='middle' fill='%23F5D01B' font-family='Arial' font-weight='bold'>CRC</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--navy:#010027;--navy2:#1c1c4f;--gold:#F5D01B;--gold2:#d9b70e;--red:#D80C37;--orange:#FF8000;--magenta:#A1159C;--blue:#3314E0;--sky:#5CB2ED;--bg:#f4f6fa;--card:#fff;--line:#dde3ee;--ok:#1a7f37;--bad:#b91c1c;--muted:#5b6472;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:'Geist',-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:#1a2233}
h1,h2,h3{font-family:'Montserrat','Geist',-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
header{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;border-bottom:3px solid;border-image:linear-gradient(90deg,var(--red),var(--orange),var(--gold),var(--magenta),var(--blue),var(--sky)) 1}
header .logo{width:38px;height:38px;border-radius:9px;background:var(--gold);color:var(--navy);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:13px;letter-spacing:.5px}
header h1{font-size:16px;margin:0;line-height:1.1;letter-spacing:.3px}
header .sub{font-size:11px;opacity:.85}
header .spacer{flex:1}
header button.link{background:transparent;border:0;color:#fff;font-size:13px;cursor:pointer;opacity:.9}
.wrap{max-width:960px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0;box-shadow:0 1px 3px rgba(16,24,40,.05)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
h2{font-size:18px;margin:0 0 4px}
h3{font-size:15px;margin:0 0 8px;color:var(--navy)}
label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
input,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff}
button.btn{background:var(--navy);color:#fff;border:0;border-radius:10px;padding:12px 16px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
button.btn:active{background:var(--navy2)}
button.btn.sec{background:#eef2f8;color:var(--navy)}
button.btn.gold{background:var(--gold);color:var(--navy)}
button.btn.sm{width:auto;padding:8px 12px;font-size:13px}
button.btn.warn{background:#fef3c7;color:#854d0e}
.tabs{display:flex;gap:6px;overflow:auto;margin:6px 0 4px;-webkit-overflow-scrolling:touch}
.tabs button{white-space:nowrap;background:#fff;border:1px solid var(--line);color:var(--navy);border-radius:999px;padding:8px 14px;font-size:13px;cursor:pointer}
.tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.big{font-size:44px;font-weight:800;color:var(--navy);line-height:1}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.pill.ok{background:#dcfce7;color:var(--ok)}
.pill.wait{background:#fef9c3;color:#854d0e}
.pill.recount{background:#fee2e2;color:var(--bad)}
.pill.none{background:#eef2f8;color:var(--muted)}
.pill.unver{background:#e0e7ff;color:#3730a3}
.pill.paused{background:#fef3c7;color:#854d0e}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.rowline{display:grid;grid-template-columns:96px 1fr 1fr;gap:8px;align-items:center;margin-bottom:7px}
.rowline .rn{font-weight:700;color:var(--navy);text-align:center;font-size:13px}
.rowline input{padding:9px;font-size:15px}
.rowline.diff input.s{border-color:var(--bad);background:#fff1f2}
.muted{color:var(--muted);font-size:13px}
.err{background:#fee2e2;color:var(--bad);padding:10px;border-radius:10px;font-size:13px;margin:8px 0}
.okbox{background:#dcfce7;color:var(--ok);padding:10px;border-radius:10px;font-size:13px;margin:8px 0}
.warnbox{background:#fef3c7;color:#854d0e;padding:10px;border-radius:10px;font-size:13px;margin:8px 0}
.kpi{display:flex;gap:12px;flex-wrap:wrap}
.kpi .box{flex:1;min-width:130px;background:#f7f9fc;border:1px solid var(--line);border-radius:12px;padding:12px}
.kpi .box .n{font-size:26px;font-weight:800;color:var(--navy)}
.kpi .box .l{font-size:11px;color:var(--muted);text-transform:uppercase}
.center{text-align:center}
.chartbox{position:relative;height:240px}
.crosscheck{font-size:13px;padding:8px 10px;border-radius:10px;margin-top:8px}
.crosscheck.good{background:#dcfce7;color:var(--ok)}
.crosscheck.bad{background:#fef3c7;color:#854d0e}
a.tile{display:block;text-decoration:none;color:inherit}
a{color:var(--navy)}
.tile .card:hover{border-color:var(--gold)}
small.v{position:fixed;bottom:6px;right:8px;color:#aab;font-size:10px}
.up{color:var(--ok);font-weight:700}.down{color:var(--bad);font-weight:700}
@media print{header,.tabs,.noprint{display:none!important}.card{box-shadow:none;border:1px solid #ccc}}
</style>
</head>
<body>
<header>
  <div class="logo">CRC</div>
  <div><h1>CRC JHB Steward</h1><div class="sub">Counting and venues</div></div>
  <div class="spacer"></div>
  <button class="link" id="whoami"></button>
  <button class="link" id="signout" style="display:none">Sign out</button>
</header>
<div class="wrap" id="app"></div>
<small class="v">v11</small>
<script>
const SB_URL="https://ufikwtreedfcuyigukbe.supabase.co";
const SB_KEY="sb_publishable_OK0GsxkIu9uTlYZ1SrZ47w_YEXJCXXv";
const EMAIL_DOMAIN="@steward.crcjhb.app";
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const app=document.getElementById('app');
let ME=null;
const ROOM_FIELDS={'Kids Church':['Kids','Volunteers','Parents'],'Mothers Room':['Mothers','Fathers','Babies'],'Toddlers Room':['Mothers','Fathers','Toddlers','Kids']};
const el=(h)=>{const t=document.createElement('template');t.innerHTML=(h||'').trim();return t.content.firstElementChild;};
const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=(n)=>Number(n||0).toLocaleString('en-ZA');
const todayISO=()=>new Date().toISOString().slice(0,10);
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function niceDate(iso){const p=String(iso).split('-');if(p.length<3)return iso;return p[2]+' '+MON[(+p[1])-1]+' '+p[0];}
function perLabel(p){return p==='AM'?'Morning':'Evening';}
function svcName(s){return perLabel(s.period)+(s.session_label?' - '+s.session_label:'')+', '+niceDate(s.service_date);}
function killChart(cv){if(!cv||!window.Chart)return;const ex=window.Chart.getChart(cv);if(ex)ex.destroy();}
function setHeader(){document.getElementById('signout').style.display=ME?'inline':'none';document.getElementById('whoami').textContent=ME?(ME.profile.full_name+' ('+ME.profile.role+')'):'';}
document.getElementById('signout').onclick=async()=>{await sb.auth.signOut();ME=null;location.hash='#/';route();};
window.addEventListener('hashchange',route);
async function loadMe(){const {data:{session}}=await sb.auth.getSession();if(!session){ME=null;return;}const {data:p}=await sb.from('profiles').select('*').eq('id',session.user.id).single();ME=p?{profile:p}:null;}
const isStaff=()=>ME&&(ME.profile.role==='admin'||ME.profile.role==='coordinator');
let PENDING=null;
async function route(){['c1','c2'].forEach(id=>{const cv=document.getElementById(id);if(cv)killChart(cv);});setHeader();const h=location.hash||'#/';if(h.startsWith('#/totals'))return viewTotals();if(h.startsWith('#/venues'))return viewVenues();if(!ME){if(h.startsWith('#/signin'))return viewSignin();if(h.startsWith('#/count')||h.startsWith('#/dashboard')){PENDING=h;return viewSignin();}return viewLanding();}setHeader();if(h.startsWith('#/count'))return viewCount();if(h.startsWith('#/dashboard'))return isStaff()?viewDashboard():viewCount();return viewLanding();}
function viewLanding(){app.innerHTML='';app.appendChild(el(`<div><div class="grid2"><a class="tile" href="#/count"><div class="card center" style="border-top:4px solid var(--blue)"><div style="font-size:34px">\u{1F9EE}</div><h2>Counters</h2><p class="muted">Count attendance on a service day. Coordinators manage the service here too.</p></div></a><a class="tile" href="#/venues"><div class="card center" style="border-top:4px solid var(--red)"><div style="font-size:34px">\u{1F511}</div><h2>Venue Bookings</h2><p class="muted">Open to the team, no login needed. Book venues, see availability, run checklists and sign out keys.</p></div></a></div><a class="tile" href="#/totals"><div class="card center" style="border-top:4px solid var(--gold)"><div style="font-size:34px">\u{1F4CA}</div><h2>Pastors: View Totals</h2><p class="muted">Live totals and comparisons, no login needed</p></div></a></div>`));}
function viewSignin(){app.innerHTML='';const dest=PENDING&&PENDING.startsWith('#/venues')?'venues':(PENDING&&(PENDING.startsWith('#/count')||PENDING.startsWith('#/dashboard'))?'count':null);const sub=dest==='venues'?'Venue bookings':(dest==='count'?'Counting':'');const c=el(`<div class="card" style="max-width:420px;margin:24px auto"><h2>Sign in${sub?' - '+sub:''}</h2><p class="center" style="margin:0 0 6px"><a href="#/">Back</a></p><div id="e"></div><label>Login (your first name)</label><input id="u" autocapitalize="none" autocorrect="off" placeholder="e.g. refilwe"/><label>PIN (6 digits)</label><input id="p" inputmode="numeric" maxlength="6" placeholder="------"/><div style="height:14px"></div><button class="btn" id="go">Sign in</button><p class="muted" style="margin-top:12px">No login yet? Ask the coordinator to add you.</p><p class="center" style="margin-top:8px"><a href="#/totals">Pastor? View totals</a></p></div>`);app.appendChild(c);const go=async()=>{const u=c.querySelector('#u').value.trim().toLowerCase();const p=c.querySelector('#p').value.trim();c.querySelector('#e').innerHTML='';if(!u||!p){c.querySelector('#e').innerHTML='<div class="err">Enter your login and PIN.</div>';return;}c.querySelector('#go').textContent='Signing in';const {error}=await sb.auth.signInWithPassword({email:u+EMAIL_DOMAIN,password:p});if(error){c.querySelector('#e').innerHTML='<div class="err">Wrong login or PIN.</div>';c.querySelector('#go').textContent='Sign in';return;}await loadMe();location.hash=PENDING||'#/';PENDING=null;route();};c.querySelector('#go').onclick=go;c.querySelector('#p').addEventListener('keydown',e=>{if(e.key==='Enter')go();});}
async function viewCount(){app.innerHTML='<div class="card">Loading</div>';const {data:openSvcs}=await sb.from('services').select('*').eq('status','open').order('created_at',{ascending:false});const opens=openSvcs||[];if(!opens.length){const {data:pz}=await sb.from('services').select('id').eq('status','paused').limit(1);const paused=pz&&pz.length;const msg=paused?'Counting is paused by the coordinator. Please wait to be told to continue.':'There is no service open for counting right now. Your coordinator opens one before the service.';app.innerHTML='<div class="card"><h2>'+(paused?'Counting paused':'No open service')+'</h2><p class="muted">'+msg+'</p><a href="#/venues"><button class="btn sec" style="margin-bottom:8px">Venue bookings</button></a>'+(isStaff()?'<a href="#/dashboard"><button class="btn sec">Go to dashboard</button></a>':'')+'</div>';return;}const {data:myAsgAll}=await sb.from('assignments').select('service_id').eq('counter_id',ME.profile.id).in('service_id',opens.map(s=>s.id));let svcIds=[...new Set((myAsgAll||[]).map(a=>a.service_id))];if(!svcIds.length)svcIds=opens.map(s=>s.id);const choices=opens.filter(s=>svcIds.includes(s.id));let service=choices.find(s=>s.id===COUNT_SVC)||choices[0];COUNT_SVC=service.id;const {data:asg}=await sb.from('assignments').select('section_id,slot,sections(name,capacity,row_count,category)').eq('service_id',service.id).eq('counter_id',ME.profile.id).order('section_id');const {data:res}=await sb.from('section_results').select('*').eq('service_id',service.id);const resById={};(res||[]).forEach(r=>resById[r.section_id]=r);const {data:mine}=await sb.from('counts').select('id,section_id,created_at').eq('service_id',service.id).eq('counter_id',ME.profile.id).order('created_at',{ascending:false});const myLatest={};(mine||[]).forEach(c=>{if(!myLatest[c.section_id])myLatest[c.section_id]=c;});const myIds=Object.values(myLatest).map(c=>c.id);const {data:myRows}=await sb.from('count_rows').select('*').in('count_id',myIds.length?myIds:['00000000-0000-0000-0000-000000000000']);const rowsByCount={};(myRows||[]).forEach(r=>{(rowsByCount[r.count_id]=rowsByCount[r.count_id]||[]).push(r);});app.innerHTML='';if(choices.length>1){const pc=el('<div class="card"><label>Which service are you counting?</label></div>');const sel=el(`<select>${choices.map(s=>`<option value="${s.id}"${s.id===service.id?' selected':''}>${esc(svcName(s))}</option>`).join('')}</select>`);sel.onchange=()=>{COUNT_SVC=sel.value;viewCount();};pc.appendChild(sel);app.appendChild(pc);}app.appendChild(el(`<div class="card"><h2>${esc(svcName(service))}</h2><p class="muted">Count each of your blocks. Enter <b>seated</b> and <b>empty</b> chairs per row. If asked to recount, your last numbers are kept - only fix the rows flagged.</p></div>`));const quick=el('<div style="margin:-6px 0 6px;display:flex;gap:8px;flex-wrap:wrap"></div>');if(isStaff())quick.appendChild(el('<a href="#/dashboard"><button class="btn sec sm">Back to dashboard</button></a>'));quick.appendChild(el('<a href="#/venues"><button class="btn sec sm">Venue bookings</button></a>'));app.appendChild(quick);if(!asg||!asg.length){app.appendChild(el('<div class="card">You have no blocks assigned yet for this service. Ask the coordinator to assign you a block.</div>'));return;}asg.forEach(a=>{const r=resById[a.section_id];const prefill=(myLatest[a.section_id]&&rowsByCount[myLatest[a.section_id].id])||null;let status='<span class="pill none">not started</span>';if(r){const m={not_started:'none',awaiting_second:'wait',recount:'recount',accepted:'ok',unverified:'unver'};const lbl={not_started:'not started',awaiting_second:'awaiting 2nd',recount:'please recheck',accepted:'accepted '+(r.final_total==null?'':r.final_total),unverified:'recorded '+(r.final_total==null?'':r.final_total)};status=`<span class="pill ${m[r.status]}">${lbl[r.status]}</span>`;}const isMin=a.sections.category==='ministry';const capline=isMin?'Room count - enter each group':('Capacity '+fmt(a.sections.capacity)+' chairs');const card=el(`<div class="card"><div style="display:flex;align-items:center;gap:8px"><h3 style="flex:1;margin:0">${esc(a.sections.name)}</h3>${status}</div><div class="muted">${capline}</div>${r&&r.status==='recount'?'<div class="warnbox">The two counts differ. Please recheck and resubmit - your previous numbers are pre-filled.</div>':''}<div class="blockbody"></div></div>`);const cbody=card.querySelector('.blockbody');const submittedOk=prefill&&r&&(r.status==='accepted'||r.status==='awaiting_second'||r.status==='unverified');if(submittedOk){cbody.innerHTML='<div class="okbox">Your count is in for this block.</div><button class="btn sec sm recount-btn">Change my count</button>';cbody.querySelector('.recount-btn').onclick=()=>renderRowEntry(cbody,service,a,prefill);}else{renderRowEntry(cbody,service,a,prefill);}app.appendChild(card);});}
function renderRowEntry(body,service,a,prefill){const isMin=a.sections.category==='ministry';const pre={};(prefill||[]).forEach(r=>{pre[r.row_no]={s:r.seated,e:r.empty};});const cap=a.sections.capacity||0;let rowsHtml='';let headHtml='';if(isMin){const fields=ROOM_FIELDS[a.sections.name]||['People'];headHtml=`<div class="rowline"><div class="rn"></div><div class="muted center">Count</div><div></div></div>`;fields.forEach((f,i)=>{const v=pre[i+1]?pre[i+1].s:'';rowsHtml+=`<div class="rowline"><div class="rn">${esc(f)}</div><input class="s" data-r="${i+1}" inputmode="numeric" placeholder="0" value="${v}"/><input class="e" data-r="${i+1}" value="0" style="display:none"/></div>`;});}else{const n=a.sections.row_count||18;headHtml=`<div class="rowline"><div class="rn"></div><div class="muted center">Seated</div><div class="muted center">Empty</div></div>`;for(let i=1;i<=n;i++){const v=pre[i]||{};rowsHtml+=`<div class="rowline"><div class="rn">Row ${i}</div><input class="s" data-r="${i}" inputmode="numeric" placeholder="seated" value="${v.s==null?'':v.s}"/><input class="e" data-r="${i}" inputmode="numeric" placeholder="empty" value="${v.e==null?'':v.e}"/></div>`;}}body.innerHTML=`${headHtml}${rowsHtml}${isMin?'':'<div style="display:flex;gap:8px;margin:6px 0"><button class="btn sec sm addrow">Add row</button></div>'}<label>Photo of your tally (optional)</label><input type="file" accept="image/*" capture="environment" class="photo"/><div class="crosscheck good cc"></div><div class="ee"></div><button class="btn submit">Submit count</button>`;const recompute=()=>{let s=0,e=0;body.querySelectorAll('.s').forEach(x=>s+=parseInt(x.value||0)||0);body.querySelectorAll('.e').forEach(x=>e+=parseInt(x.value||0)||0);const cc=body.querySelector('.cc');const sum=s+e;let msg;if(isMin||!cap){cc.className='crosscheck good cc';msg=`Total counted: <b>${fmt(s)}</b>`;}else{msg=`Seated <b>${fmt(s)}</b>, empty <b>${fmt(e)}</b>, total <b>${fmt(sum)}</b> vs capacity ${fmt(cap)}`;if(sum!==cap){cc.className='crosscheck bad cc';msg+=`. Off by ${sum-cap>0?'+':''}${sum-cap}, please recheck.`;}else{cc.className='crosscheck good cc';msg+='. Matches.';}}cc.innerHTML=msg;};body.addEventListener('input',recompute);const ar=body.querySelector('.addrow');if(ar)ar.onclick=()=>{const rn=body.querySelectorAll('.s').length+1;const line=el(`<div class="rowline"><div class="rn">Row ${rn}</div><input class="s" data-r="${rn}" inputmode="numeric" placeholder="seated"/><input class="e" data-r="${rn}" inputmode="numeric" placeholder="empty"/></div>`);ar.parentElement.before(line);};recompute();body.querySelector('.submit').onclick=()=>submitCount(body,service,a);}
async function submitCount(body,service,a){const btn=body.querySelector('.submit');const rows=[];let seated=0,empty=0;body.querySelectorAll('.rowline').forEach(line=>{const si=line.querySelector('.s'),ei=line.querySelector('.e');if(!si)return;const rn=parseInt(si.dataset.r);const s=parseInt(si.value||0)||0,e=parseInt(ei?ei.value:0||0)||0;if(si.value===''&&(!ei||ei.value===''||ei.value==='0'))if(si.value==='')return;rows.push({row_no:rn,seated:s,empty:e});seated+=s;empty+=e;});if(!rows.length){body.querySelector('.ee').innerHTML='<div class="err">Enter at least one value.</div>';return;}btn.textContent='Submitting';btn.disabled=true;body.querySelector('.ee').innerHTML='';let photo_path=null;const pf=body.querySelector('.photo').files[0];if(pf){const path=`${service.id}/${a.section_id}/${ME.profile.id}-${Date.now()}.jpg`;const up=await sb.storage.from('photos').upload(path,pf,{upsert:true});if(!up.error)photo_path=path;}const ins=await sb.from('counts').insert({service_id:service.id,section_id:a.section_id,counter_id:ME.profile.id,attempt:1,figure:seated,seated:seated,empty:empty,photo_path:photo_path}).select('id').single();if(ins.error){body.querySelector('.ee').innerHTML='<div class="err">Could not submit: '+esc(ins.error.message)+'</div>';btn.textContent='Submit count';btn.disabled=false;return;}const cid=ins.data.id;await sb.from('count_rows').insert(rows.map(r=>({count_id:cid,row_no:r.row_no,seated:r.seated,empty:r.empty})));body.innerHTML='<div class="okbox">Count submitted. Total '+fmt(seated)+'.</div>';setTimeout(()=>viewCount(),900);}
let DASH_TAB='live';
async function viewDashboard(){app.innerHTML='';app.appendChild(el(`<div><div style="margin-bottom:8px"><a href="#/count"><button class="btn sec sm">Count a block (if you are assigned)</button></a></div><div class="tabs" id="tabs"><button data-t="live">Live count</button><button data-t="venues">Venues</button><button data-t="reconcile">Reconcile</button><button data-t="service">Service</button><button data-t="report">Report</button><button data-t="team">Team</button><button data-t="compare">Compare</button></div><div id="tabbody"></div></div>`));document.querySelectorAll('#tabs button').forEach(b=>{b.onclick=()=>{DASH_TAB=b.dataset.t;paintTabs();};});paintTabs();}
function paintTabs(){document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===DASH_TAB));const body=document.getElementById('tabbody');if(!body)return;body.innerHTML='<div class="card">Loading</div>';if(DASH_TAB==='live')tabLive(body);else if(DASH_TAB==='venues')tabVenues(body);else if(DASH_TAB==='reconcile')tabReconcile(body);else if(DASH_TAB==='service')tabService(body);else if(DASH_TAB==='report')tabReport(body);else if(DASH_TAB==='team')tabTeam(body);else if(DASH_TAB==='compare')tabCompare(body);}
async function currentService(){const {data}=await sb.from('services').select('*').order('created_at',{ascending:false}).limit(20);const list=data||[];return list.find(s=>s.status==='open')||list.find(s=>s.status==='paused')||list[0];}
function accepted(r){return r&&(r.status==='accepted'||r.status==='unverified');}
let VIEW_SVC=null,COUNT_SVC=null;
async function listServices(){const {data}=await sb.from('services').select('*').order('created_at',{ascending:false}).limit(30);return data||[];}

async function tabLive(body){const list=await listServices();const active=list.filter(s=>s.status==='open'||s.status==='paused');const pool=active.length?active:list.slice(0,1);if(!pool.length){body.innerHTML='<div class="card">No service yet. Open one in the <b>Service</b> tab.</div>';return;}let svc=pool.find(s=>s.id===VIEW_SVC)||pool[0];VIEW_SVC=svc.id;const {data:secs}=await sb.from('sections').select('*').eq('active',true).order('sort_order');const {data:res}=await sb.from('section_results').select('*').eq('service_id',svc.id);const resById={};(res||[]).forEach(r=>resById[r.section_id]=r);const aud=(secs||[]).filter(s=>s.category==='auditorium');const min=(secs||[]).filter(s=>s.category==='ministry');let audT=0,audDone=0;const cap=aud.reduce((a,s)=>a+(s.capacity||0),0);aud.forEach(s=>{const r=resById[s.id];if(accepted(r)){audT+=r.final_total||0;audDone++;}});let minT=0;min.forEach(s=>{const r=resById[s.id];if(accepted(r))minT+=r.final_total||0;});const stcls=svc.status==='open'?'ok':(svc.status==='paused'?'paused':'none');body.innerHTML='';if(pool.length>1){const pc=el('<div class="card noprint"><label>Viewing service</label></div>');pc.appendChild(svcPicker(pool,svc.id,(id)=>{VIEW_SVC=id;tabLive(body);}));body.appendChild(pc);}body.appendChild(el(`<div class="card"><div style="display:flex;align-items:center"><div style="flex:1"><div class="muted">${esc(svcName(svc))} <span class="pill ${stcls}">${svc.status}</span></div><div class="big">${fmt(audT)}</div><div class="muted">auditorium head count, ${audDone} of ${aud.length} blocks, capacity ${fmt(cap)}</div>${minT>0?`<div class="muted" style="margin-top:6px">+ ministry rooms ${fmt(minT)} &nbsp; = &nbsp; <b>building total ${fmt(audT+minT)}</b></div>`:''}</div></div><button class="btn sec sm" id="refresh">Refresh</button></div>`));const rowsFor=(arr)=>arr.map(s=>{const r=resById[s.id];const map={accepted:['ok','accepted'],awaiting_second:['wait','awaiting 2nd'],recount:['recount','recheck'],unverified:['unver','recorded'],not_started:['none','not started']};const st=r?r.status:'not_started';const mm=map[st]||['none','not started'];return `<tr><td>${esc(s.name)}</td><td><span class="pill ${mm[0]}">${mm[1]}</span></td><td style="text-align:right;font-weight:700">${r&&r.final_total!=null?fmt(r.final_total):''}</td></tr>`;}).join('');body.appendChild(el(`<div class="card"><h3>Auditorium blocks</h3><table><thead><tr><th>Block</th><th>Status</th><th style="text-align:right">Total</th></tr></thead><tbody>${rowsFor(aud)}</tbody></table></div>`));if(min.length)body.appendChild(el(`<div class="card"><h3>Ministry rooms (counted separately)</h3><table><thead><tr><th>Room</th><th>Status</th><th style="text-align:right">People</th></tr></thead><tbody>${rowsFor(min)}</tbody></table></div>`));document.getElementById('refresh').onclick=()=>tabLive(body);}
async function tabReconcile(body){const list=await listServices();const active=list.filter(s=>s.status==='open'||s.status==='paused');const pool=active.length?active:list.slice(0,1);if(!pool.length){body.innerHTML='<div class="card">No service.</div>';return;}let service=pool.find(s=>s.id===VIEW_SVC)||pool[0];VIEW_SVC=service.id;const {data:secs}=await sb.from('sections').select('*').eq('active',true).order('sort_order');const {data:res}=await sb.from('section_results').select('*').eq('service_id',service.id);const {data:counts}=await sb.from('counts').select('id,section_id,counter_id,created_at,seated,figure,profiles(full_name)').eq('service_id',service.id).order('created_at',{ascending:false});const latestByCS={};(counts||[]).forEach(c=>{const k=c.section_id+'-'+c.counter_id;if(!latestByCS[k])latestByCS[k]=c;});const bySec={};Object.values(latestByCS).forEach(c=>{(bySec[c.section_id]=bySec[c.section_id]||[]).push(c);});const ids=Object.values(latestByCS).map(c=>c.id);const {data:crows}=await sb.from('count_rows').select('*').in('count_id',ids.length?ids:['00000000-0000-0000-0000-000000000000']);const rowsByCount={};(crows||[]).forEach(r=>{(rowsByCount[r.count_id]=rowsByCount[r.count_id]||{})[r.row_no]=r;});const resById={};(res||[]).forEach(r=>resById[r.section_id]=r);body.innerHTML='';if(pool.length>1){const pc=el('<div class="card noprint"><label>Viewing service</label></div>');pc.appendChild(svcPicker(pool,service.id,(id)=>{VIEW_SVC=id;tabReconcile(body);}));body.appendChild(pc);}body.appendChild(el('<div class="card"><h3>Reconciliation</h3><p class="muted">Blocks where the two counters differ by more than 5. The rows that do not match are highlighted - ask those counters to recheck only those rows.</p></div>'));let any=false;(secs||[]).forEach(s=>{const cs=bySec[s.id]||[];if(cs.length<2)return;const A=cs[0],B=cs[1];const diff=Math.abs((A.seated||A.figure||0)-(B.seated||B.figure||0));const r=resById[s.id];if(diff<=5&&r&&r.status==='accepted')return;any=true;const rowsA=rowsByCount[A.id]||{},rowsB=rowsByCount[B.id]||{};const allRows=[...new Set([...Object.keys(rowsA),...Object.keys(rowsB)].map(Number))].sort((a,b)=>a-b);let rh='';const offRows=[];allRows.forEach(rn=>{const sa=rowsA[rn]?rowsA[rn].seated:'',sbv=rowsB[rn]?rowsB[rn].seated:'';const d=(sa!==''&&sbv!=='')?(sa-sbv):'';if(d!==0&&d!=='')offRows.push(rn);const hl=(d!==''&&d!==0)?' style="background:#fff1f2"':'';rh+=`<tr${hl}><td>${rn}</td><td>${sa}</td><td>${sbv}</td><td>${d!==0&&d!==''?'<b style=\"color:#b91c1c\">'+(d>0?'+':'')+d+'</b>':(d===0?'ok':'')}</td></tr>`;});const canAvg=diff<=5;const card=el(`<div class="card"><div style="display:flex;align-items:center"><h3 style="flex:1;margin:0">${esc(s.name)}</h3><span class="pill ${canAvg?'ok':'recount'}">total diff ${diff}</span></div><div class="muted">${esc(A.profiles?A.profiles.full_name:'A')}: ${fmt(A.seated||A.figure)}, ${esc(B.profiles?B.profiles.full_name:'B')}: ${fmt(B.seated||B.figure)}</div>${offRows.length?`<div class="warnbox">Rows to recheck: ${offRows.join(', ')}</div>`:''}<table style="margin-top:8px"><thead><tr><th>Row</th><th>${esc((A.profiles?A.profiles.full_name:'A').split(' ')[0])}</th><th>${esc((B.profiles?B.profiles.full_name:'B').split(' ')[0])}</th><th>Diff</th></tr></thead><tbody>${rh}</tbody></table><div style="margin-top:8px">${canAvg?`<button class="btn sec sm force">Accept ${fmt(Math.round(((A.seated||A.figure)+(B.seated||B.figure))/2))} (average)</button>`:'<span class="muted">Difference is more than 5 - the flagged rows must be recounted, no average allowed.</span>'}</div></div>`);const fb=card.querySelector('.force');if(fb)fb.onclick=async()=>{const total=Math.round(((A.seated||A.figure)+(B.seated||B.figure))/2);await sb.from('section_results').update({status:'accepted',final_total:total,updated_at:new Date().toISOString()}).eq('service_id',service.id).eq('section_id',s.id);tabReconcile(body);};body.appendChild(card);});if(!any)body.appendChild(el('<div class="card okbox">No mismatches to reconcile right now.</div>'));}
async function tabService(body){const list=await listServices();const active=list.filter(s=>s.status==='open'||s.status==='paused');body.innerHTML='';active.forEach(sv=>{const isOpen=sv.status==='open';const card=el(`<div class="card"><div style="display:flex;align-items:center;gap:8px"><h3 style="flex:1;margin:0">${esc(svcName(sv))}</h3><span class="pill ${isOpen?'ok':'paused'}">${sv.status}</span></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"><button class="btn sec sm b-assign">Assign counters</button><button class="btn sec sm b-edit">Edit details</button>${isOpen?'<button class="btn warn sm b-pause">Pause</button>':'<button class="btn sm b-resume">Resume</button>'}<button class="btn sm b-close">Close</button></div><div class="editbox"></div><div class="assignbox"></div></div>`);card.querySelector('.b-assign').onclick=()=>renderAssign(card.querySelector('.assignbox'),sv);card.querySelector('.b-edit').onclick=()=>{const eb=card.querySelector('.editbox');eb.innerHTML=`<div style="border-top:1px solid var(--line);margin-top:12px;padding-top:10px"><label>Date</label><input type="date" class="ed" value="${sv.service_date}"/><label>Service</label><select class="ep"><option value="AM"${sv.period==='AM'?' selected':''}>Morning (AM)</option><option value="PM"${sv.period==='PM'?' selected':''}>Evening (PM)</option></select><label>Session label (optional, e.g. AM 1)</label><input class="el" value="${esc(sv.session_label||'')}"/><div style="height:8px"></div><button class="btn sm b-esave">Save details</button></div>`;eb.querySelector('.b-esave').onclick=async()=>{const {error}=await sb.from('services').update({service_date:eb.querySelector('.ed').value,period:eb.querySelector('.ep').value,session_label:eb.querySelector('.el').value.trim()||null}).eq('id',sv.id);if(error){alert(error.message);return;}tabService(body);};};const pb=card.querySelector('.b-pause');if(pb)pb.onclick=async()=>{await sb.from('services').update({status:'paused'}).eq('id',sv.id); async function tabReport(body){const {data:services}=await sb.from('services').select('*').order('created_at',{ascending:false}).limit(40);const list=services||[];if(!list.length){body.innerHTML='<div class="card">No services yet. Open and count a service first.</div>';return;}body.innerHTML=`<div class="card noprint"><h3>Service report</h3><label>Choose a service</label><select id="rsel">${list.map(s=>`<option value="${s.id}">${esc(svcName(s))} (${s.status})</option>`).join('')}</select><div style="display:flex;gap:8px;margin-top:10px"><button class="btn sec sm" id="rprint">Print / save PDF</button><button class="btn sec sm" id="rcsv">Download CSV</button></div></div><div id="rbody"></div>`;const sel=body.querySelector('#rsel');let CSV='';const render=async(sid)=>{const svc=list.find(s=>s.id===sid);const rb=body.querySelector('#rbody');rb.innerHTML='<div class="card">Loading</div>';const {data:secs}=await sb.from('sections').select('*').eq('active',true).order('sort_order');const {data:res}=await sb.from('section_results').select('*').eq('service_id',sid);const {data:hist}=await sb.from('attendance_history').select('*').eq('period',svc.period).order('service_date',{ascending:false});const resById={};(res||[]).forEach(r=>resById[r.section_id]=r);const aud=(secs||[]).filter(s=>s.category==='auditorium');const min=(secs||[]).filter(s=>s.category==='ministry');let gSeat=0,gCap=0,gEmpty=0,done=0;let csvRows=[['Section','Type','Capacity','Count','Empty','Status']];const mkRows=(arr,type)=>arr.map(s=>{const r=resById[s.id];const seat=accepted(r)?(r.final_total||0):null;const cap=s.capacity||0;const empty=(seat!=null&&cap)?Math.max(cap-seat,0):null;if(type==='auditorium'){gCap+=cap;if(seat!=null){gSeat+=seat;gEmpty+=(empty||0);done++;}}csvRows.push([s.name,type,cap||'',seat==null?'':seat,empty==null?'':empty,r?r.status:'not started']);const st=r?r.status:'not started';return `<tr><td>${esc(s.name)}</td><td>${cap?fmt(cap):'-'}</td><td style="font-weight:700">${seat==null?'-  const c=el(`<div class="card"><h3>Book a venue</h3><div class="fe"></div>${ME?'':`<label>Your name</label><input class="f-nm" value="${esc(localStorage.getItem('vb_name')||'')}" placeholder="who is booking"/>`}<div class="grid2"><div><label>Venue</label><select class="f-v">${venues.map(v=>`<option value="${v.id}">${esc(v.name)}${v.capacity?' ('+fmt(v.capacity)+')':''}</option>`).join('')}</select><div class="muted f-feat" style="margin-top:4px"></div></div><div><label>Type of function</label><select class="f-t">${types.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div></div><label>What is it? (name of the event)</label><input class="f-title" placeholder="e.g. Mens breakfast"/><div class="grid2"><div><label>Date</label><input type="date" class="f-d" value="${VB_DATE}"/></div><div><label>Expected attendance</label><input class="f-a" inputmode="numeric" placeholder="optional"/></div></div><div class="grid2"><div><label>Starts</label><input type="time" class="f-s" value="09:00"/></div><div><label>Ends</label><input type="time" class="f-e" value="12:00"/></div></div><div style="display:flex;gap:16px;margin-top:10px;font-size:14px"><label style="display:flex;align-items:center;gap:6px;margin:0"><input type="checkbox" class="f-snd" style="width:auto"/> Sound needed</label><label style="display:flex;align-items:center;gap:6px;margin:0"><input type="checkbox" class="f-vis" style="width:auto"/> Visual needed</label></div><label>Notes (optional)</label><input class="f-n" placeholder="anything the team should know"/><div style="height:10px"></div><button class="btn f-go">Submit booking</button><p class="muted" style="margin-top:8px">${'The checklist for the chosen function type is created automatically on the booking.'}</p></div>`);
 const feat=()=>{const v=venues.find(x=>x.id===c.querySelector('.f-v').value);c.querySelector('.f-feat').textContent=v?['Has:',v.has_sound?'sound':null,v.has_visual?'visual':null,v.requires_key?'key sign-out':null].filter(Boolean).join(' ').replace('Has: ','Has ').replace(/ /g,', ').replace('Has,','Has'):'';};
 const vsel=c.querySelector('.f-v');vsel.onchange=()=>{const v=venues.find(x=>x.id===vsel.value);c.querySelector('.f-feat').textContent=v?('Equipment: '+[v.has_sound?'sound':'',v.has_visual?'visual':'',v.requires_key?'key sign-out':''].filter(Boolean).join(', ')||'none'):'';};
 vsel.onchange();
 c.querySelector('.f-go').onclick=async()=>{
  const fe=c.querySelector('.fe');fe.innerHTML='';
  const vid=vsel.value,ft=parseInt(c.querySelector('.f-t').value),title=c.querySelector('.f-title').value.trim(),d=c.querySelector('.f-d').value,st=c.querySelector('.f-s').value,en=c.querySelector('.f-e').value;
  const nm=ME?ME.profile.full_name:(c.querySelector('.f-nm')?c.querySelector('.f-nm').value.trim():'');
  if(!nm){fe.innerHTML='<div class="err">Enter your name.</div>';return;}
  if(!ME)localStorage.setItem('vb_name',nm);
  if(!title){fe.innerHTML='<div class="err">Give the booking a name.</div>';return;}
  if(!d||!st||!en){fe.innerHTML='<div class="err">Fill in the date and times.</div>';return;}
  const starts=d+'T'+st+':00'+SAST_OFF,ends=d+'T'+en+':00'+SAST_OFF;
  if(new Date(ends)<=new Date(starts)){fe.innerHTML='<div class="err">The end time must be after the start time.</div>';return;}
  const btn=c.querySelector('.f-go');btn.textContent='Booking';btn.disabled=true;
  const {data:clash}=await sb.from('bookings').select('title,starts_at,ends_at,booked_by_name').eq('venue_id',vid).in('status',['requested','confirmed']).lt('starts_at',ends).gt('ends_at',starts);
  if(clash&&clash.length){const x=clash[0];fe.innerHTML=`<div class="err">That venue is already booked then: ${esc(x.title)} (${vtime(x.starts_at)} to ${vtime(x.ends_at)}, by ${esc(x.booked_by_name||'')}). Pick another time or venue.</div>`;btn.textContent='Submit booking';btn.disabled=false;return;}
  const {error}=await sb.from('bookings').insert({venue_id:vid,requester_id:ME?ME.profile.id:null,booked_by_name:nm,title:title,function_type_id:ft,starts_at:starts,ends_at:ends,status:'confirmed',expected_attendance:parseInt(c.querySelector('.f-a').value)||null,sound_needed:c.querySelector('.f-snd').checked,visual_needed:c.querySelector('.f-vis').checked,notes:c.querySelector('.f-n').value.trim()||null});
  if(error){fe.innerHTML='<div class="err">'+(error.code==='23P01'?'That venue was booked for that time a moment ago. Refresh and pick another slot.':'Could not book: '+esc(error.message))+'</div>';btn.textContent='Submit booking';btn.disabled=false;return;}
  VB_DATE=d;VB_MODE='board';renderVenues(box);
 };
 return c;
}
async function renderManage(box,venues,types,keys){
 const {data:tpl}=await sb.from('checklist_templates').select('*').order('sort_order');
 const templates=tpl||[];
 const wrap=el('<div></div>');
 wrap.appendChild(el('<div class="card"><h3>Manage venues and checklists</h3><p class="muted">Everything below is a placeholder set. Rename venues, fix capacities, tick what each venue has, and adjust the checklist for each type of function. Changes apply immediately for the whole team.</p></div>'));
 // venues
 const vc=el('<div class="card"><h3>Venues</h3><div class="mv"></div></div>');
 const mv=vc.querySelector('.mv');
 venues.forEach(v=>{
  const vkeys=keys.filter(k=>k.venue_id===v.id);
  const r=el(`<div style="border-top:1px solid var(--line);padding:12px 0"><div class="grid2"><div><label>Name</label><input class="n" value="${esc(v.name)}"/></div><div><label>Capacity</label><input class="cp" inputmode="numeric" value="${v.capacity||''}"/></div></div><div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:13px;align-items:center"><label style="display:flex;align-items:center;gap:5px;margin:0"><input type="checkbox" class="hs" ${v.has_sound?'checked':''} style="width:auto"/> Sound</label><label style="display:flex;align-items:center;gap:5px;margin:0"><input type="checkbox" class="hv" ${v.has_visual?'checked':''} style="width:auto"/> Visual</label><label style="display:flex;align-items:center;gap:5px;margin:0"><input type="checkbox" class="rk" ${v.requires_key?'checked':''} style="width:auto"/> Key sign-out</label><button class="btn sec sm sv" style="margin-left:auto">Save</button><button class="btn warn sm rm">Remove</button></div><div class="muted" style="margin-top:4px">Keys: ${vkeys.length?vkeys.map(k=>esc(k.name)).join(', '):'none'}</div></div>`);
  r.querySelector('.sv').onclick=async()=>{
   const nm=r.querySelector('.n').value.trim();
   const rk=r.querySelector('.rk').checked;
   const {error}=await sb.from('venues').update({name:nm,capacity:parseInt(r.querySelector('.cp').value)||null,has_sound:r.querySelector('.hs').checked,has_visual:r.querySelector('.hv').checked,requires_key:rk}).eq('id',v.id);
   if(error){alert(error.message);return;}
   if(rk&&!keys.some(k=>k.venue_id===v.id))await sb.from('venue_keys').insert({venue_id:v.id,name:nm+' key'});
   if(nm!==v.name)await Promise.all(keys.filter(k=>k.venue_id===v.id&&k.name===v.name+' key').map(k=>sb.from('venue_keys').update({name:nm+' key'}).eq('id',k.id)));
   renderVenues(box);
  };
  r.querySelector('.rm').onclick=async()=>{if(!confirm('Hide '+v.name+'? Existing bookings stay in history.'))return;await sb.from('venues').update({active:false}).eq('id',v.id);renderVenues(box);};
  mv.appendChild(r);
 });
 const addV=el('<div style="border-top:2px solid var(--line);padding-top:12px;margin-top:4px"><label>Add a venue</label><div class="grid2"><input class="an" placeholder="name"/><input class="ac" inputmode="numeric" placeholder="capacity"/></div><div style="height:8px"></div><button class="btn sec sm aa">Add venue</button></div>');
 addV.querySelector('.aa').onclick=async()=>{const nm=addV.querySelector('.an').value.trim();if(!nm)return;const {data:nv,error}=await sb.from('venues').insert({name:nm,capacity:parseInt(addV.querySelector('.ac').value)||null,requires_key:true,sort_order:99}).select('id').single();if(error){alert(error.message);return;}await sb.from('venue_keys').insert({venue_id:nv.id,name:nm+' key'});renderVenues(box);};
 mv.appendChild(addV);
 wrap.appendChild(vc);
 // function types + checklists
 const tc=el('<div class="card"><h3>Function types and checklists</h3><div class="mt"></div></div>');
 const mt=tc.querySelector('.mt');
 types.forEach(t=>{
  const mine=templates.filter(x=>x.function_type_id===t.id&&x.active);
  const r=el(`<div style="border-top:1px solid var(--line);padding:12px 0"><div style="display:flex;gap:8px;align-items:center"><input class="tn" value="${esc(t.name)}" style="flex:1"/><button class="btn sec sm ts">Save</button><button class="btn warn sm tr">Remove</button></div><div class="items" style="margin-top:8px"></div><div style="display:flex;gap:8px;margin-top:6px"><input class="ni" placeholder="add a checklist task" style="flex:1"/><button class="btn sec sm na">Add</button></div></div>`);
  const it=r.querySelector('.items');
  mine.forEach(x=>{
   const li=el(`<div style="display:flex;gap:8px;align-items:center;margin:4px 0"><input class="lb" value="${esc(x.label)}" style="flex:1"/><button class="btn sec sm ls">Save</button><button class="btn warn sm ld">X</button></div>`);
   li.querySelector('.ls').onclick=async()=>{await sb.from('checklist_templates').update({label:li.querySelector('.lb').value.trim()}).eq('id',x.id);renderVenues(box);};
   li.querySelector('.ld').onclick=async()=>{await sb.from('checklist_templates').update({active:false}).eq('id',x.id);renderVenues(box);};
   it.appendChild(li);
  });
  r.querySelector('.ts').onclick=async()=>{await sb.from('function_types').update({name:r.querySelector('.tn').value.trim()}).eq('id',t.id);renderVenues(box);};
  r.querySelector('.tr').onclick=async()=>{if(!confirm('Hide '+t.name+'?'))return;await sb.from('function_types').update({active:false}).eq('id',t.id);renderVenues(box);};
  r.querySelector('.na').onclick=async()=>{const lb=r.querySelector('.ni').value.trim();if(!lb)return;await sb.from('checklist_templates').insert({function_type_id:t.id,label:lb,sort_order:(mine.length?Math.max(...mine.map(m=>m.sort_order)):0)+1});renderVenues(box);};
  mt.appendChild(r);
 });
 const addT=el('<div style="border-top:2px solid var(--line);padding-top:12px"><div style="display:flex;gap:8px"><input class="atn" placeholder="new function type, e.g. Baby dedication" style="flex:1"/><button class="btn sec sm ata">Add type</button></div></div>');
 addT.querySelector('.ata').onclick=async()=>{const nm=addT.querySelector('.atn').value.trim();if(!nm)return;await sb.from('function_types').insert({name:nm,sort_order:99});renderVenues(box);};
 mt.appendChild(addT);
 wrap.appendChild(tc);
 box.appendChild(wrap);
}
(async()=>{await loadMe();route();})();
</script>
</body>
